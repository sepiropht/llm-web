<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="light dark" />
<meta name="theme-color" content="#0d1117" media="(prefers-color-scheme: dark)" />
<title>LLM Web</title>
<style>
:root{
  --bg:#ffffff; --bg-alt:#f7f7f8; --bg-side:#fafafa; --border:#e5e5e7;
  --text:#1a1a1a; --text-dim:#6b7280; --text-faint:#9ca3af;
  --accent:#7c3aed; --bubble-user:#f0eefe; --bubble-user-border:#e0dbfb;
  --code-bg:#f3f3f5; --hover:#f0f0f2; --active:#ececf0; --shadow:0 1px 3px rgba(0,0,0,.08);
  --claude:#d97757; --kimi:#a06cf0; --gemini:#4285f4; --grok:#3b3b3b; --mistral:#ff7000; --qwen:#615ced;
}
:root[data-theme=dark],
@media (prefers-color-scheme: dark){:root:not([data-theme=light]){
  --bg:#0d1117; --bg-alt:#161b22; --bg-side:#0d1117; --border:#21262d;
  --text:#e6edf3; --text-dim:#8b949e; --text-faint:#6e7681;
  --accent:#a371f7; --bubble-user:#1c2333; --bubble-user-border:#2a3550;
  --code-bg:#161b22; --hover:#161b22; --active:#1c2333; --shadow:0 1px 3px rgba(0,0,0,.4);
  --grok:#c9c9c9;
}}
:root[data-theme=dark]{
  --bg:#0d1117; --bg-alt:#161b22; --bg-side:#0d1117; --border:#21262d;
  --text:#e6edf3; --text-dim:#8b949e; --text-faint:#6e7681;
  --accent:#a371f7; --bubble-user:#1c2333; --bubble-user-border:#2a3550;
  --code-bg:#161b22; --hover:#161b22; --active:#1c2333; --shadow:0 1px 3px rgba(0,0,0,.4); --grok:#c9c9c9;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--text);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
#app{display:flex;height:100dvh;overflow:hidden}

/* ---------- sidebar ---------- */
#sidebar{width:300px;flex-shrink:0;background:var(--bg-side);border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100%;transition:transform .25s ease;z-index:40}
.side-head{padding:14px 14px 8px;display:flex;align-items:center;gap:8px}
.logo{font-weight:700;font-size:16px;letter-spacing:-.02em;display:flex;align-items:center;gap:7px}
.logo .mark{color:var(--accent)}
.side-head .spacer{flex:1}
.icon-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;padding:6px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:16px}
.icon-btn:hover{background:var(--hover);color:var(--text)}
.new-btn{margin:6px 12px 8px;padding:9px 12px;background:var(--accent);color:#fff;border:none;border-radius:10px;
  font-weight:600;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:8px;justify-content:center}
.new-btn:hover{filter:brightness(1.07)}
.search{margin:0 12px 8px;position:relative}
.search input{width:100%;padding:8px 10px 8px 32px;border:1px solid var(--border);border-radius:9px;
  background:var(--bg);color:var(--text);font-size:14px;outline:none}
.search input:focus{border-color:var(--accent)}
.search svg{position:absolute;left:9px;top:9px;color:var(--text-faint)}
.chips{display:flex;gap:6px;flex-wrap:wrap;padding:0 12px 8px}
.chip{font-size:12px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--bg);
  color:var(--text-dim);cursor:pointer;user-select:none;white-space:nowrap;display:flex;align-items:center;gap:5px}
.chip .dot{width:7px;height:7px;border-radius:50%}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip.active .dot{display:none}
.sessions{flex:1;overflow-y:auto;padding:0 8px 20px}
.group-label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-faint);
  padding:12px 8px 4px;font-weight:600}
.sess{padding:9px 10px;border-radius:9px;cursor:pointer;margin-bottom:1px;position:relative}
.sess:hover{background:var(--hover)}
.sess.active{background:var(--active)}
.sess-top{display:flex;align-items:center;gap:7px;margin-bottom:2px}
.sess-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sess-title{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.sess-meta{font-size:11.5px;color:var(--text-faint);display:flex;gap:6px;align-items:center;padding-left:15px}
.sess-meta .proj{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sess-time{margin-left:auto;flex-shrink:0}
.side-foot{padding:8px 14px;border-top:1px solid var(--border);font-size:11.5px;color:var(--text-faint);
  display:flex;align-items:center;gap:8px}

/* ---------- main ---------- */
#main{flex:1;display:flex;flex-direction:column;height:100%;min-width:0;background:var(--bg)}
.top{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 14px;flex-shrink:0}
.top .hamburger{display:none}
.top-title{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-sub{font-size:12px;color:var(--text-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;color:#fff;flex-shrink:0}
.top .spacer{flex:1}
.messages{flex:1;overflow-y:auto;padding:22px 0 8px}
.msg-wrap{max-width:760px;margin:0 auto;padding:0 20px}
.msg{margin-bottom:22px;display:flex;flex-direction:column;gap:4px}
.msg .who{font-size:12px;font-weight:600;color:var(--text-dim);display:flex;align-items:center;gap:6px}
.avatar{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff}
.bubble{border-radius:12px;padding:2px 2px}
.msg.user .content{background:var(--bubble-user);border:1px solid var(--bubble-user-border);
  border-radius:12px;padding:10px 14px;align-self:flex-start;max-width:100%}
.content{word-wrap:break-word;overflow-wrap:anywhere}
.content p{margin:.5em 0}
.content p:first-child{margin-top:0}.content p:last-child{margin-bottom:0}
.content pre{background:var(--code-bg);border:1px solid var(--border);border-radius:8px;padding:12px;
  overflow-x:auto;font-size:13px;line-height:1.45;margin:.6em 0}
.content code{background:var(--code-bg);padding:1px 5px;border-radius:5px;font-size:.9em;
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
.content pre code{background:none;padding:0}
.content h1,.content h2,.content h3{margin:.8em 0 .4em;line-height:1.3}
.content h1{font-size:1.35em}.content h2{font-size:1.2em}.content h3{font-size:1.05em}
.content ul,.content ol{margin:.5em 0;padding-left:1.4em}
.content li{margin:.2em 0}
.content a{color:var(--accent);text-decoration:none}.content a:hover{text-decoration:underline}
.content blockquote{border-left:3px solid var(--border);margin:.5em 0;padding-left:12px;color:var(--text-dim)}
.content table{border-collapse:collapse;margin:.5em 0;display:block;overflow-x:auto}
.content th,.content td{border:1px solid var(--border);padding:5px 9px;font-size:13px}
.think,.tool{border:1px solid var(--border);border-radius:9px;margin:.5em 0;background:var(--bg-alt);overflow:hidden}
.think>summary,.tool>summary{cursor:pointer;padding:7px 12px;font-size:12.5px;color:var(--text-dim);
  font-weight:600;list-style:none;display:flex;align-items:center;gap:7px;user-select:none}
.think>summary::-webkit-details-marker{display:none}
.think .body,.tool .body{padding:0 12px 10px;font-size:13px;color:var(--text-dim);white-space:pre-wrap;
  font-family:ui-monospace,Menlo,monospace;max-height:340px;overflow:auto}
.tool .body{font-size:12px}
.pill{font-size:10.5px;padding:1px 7px;border-radius:20px;background:var(--code-bg);color:var(--text-faint)}

.composer{border-top:1px solid var(--border);padding:12px 20px 16px;flex-shrink:0}
.composer-inner{max-width:760px;margin:0 auto}
.provider-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.provider-row .lbl{font-size:12px;color:var(--text-faint);margin-right:2px}
.psel{font-size:12px;padding:4px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);
  color:var(--text-dim);cursor:pointer;display:flex;align-items:center;gap:5px}
.psel.active{border-color:var(--accent);color:var(--text);background:var(--bg-alt)}
.psel:disabled{opacity:.35;cursor:not-allowed}
.input-box{display:flex;gap:8px;align-items:flex-end;border:1px solid var(--border);border-radius:14px;
  padding:8px 8px 8px 14px;background:var(--bg)}
.input-box:focus-within{border-color:var(--accent)}
.input-box textarea{flex:1;border:none;background:none;resize:none;outline:none;color:var(--text);
  font-family:inherit;font-size:15px;max-height:180px;line-height:1.5;padding:4px 0}
.send{width:34px;height:34px;border-radius:9px;border:none;background:var(--accent);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send:disabled{opacity:.4;cursor:default}
.hint{font-size:11px;color:var(--text-faint);text-align:center;margin-top:7px}

.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text-faint);text-align:center;padding:20px}
.empty h2{color:var(--text);font-size:20px;margin:0}
.empty .big{font-size:44px}
.loading{padding:40px;text-align:center;color:var(--text-faint)}
.cursor-blink{display:inline-block;width:7px;height:15px;background:var(--accent);vertical-align:text-bottom;
  animation:blink 1s step-end infinite;margin-left:1px}
@keyframes blink{50%{opacity:0}}
.scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:35}

@media (max-width:820px){
  #sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);box-shadow:var(--shadow)}
  #sidebar.open{transform:translateX(0)}
  .top .hamburger{display:flex}
  .scrim.show{display:block}
  .msg-wrap{padding:0 14px}
  .composer{padding:10px 12px 14px}
}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="side-head">
      <div class="logo"><span class="mark">▐█▌</span> LLM&nbsp;Web</div>
      <div class="spacer"></div>
      <button class="icon-btn" id="themeBtn" title="Thème">◐</button>
    </div>
    <button class="new-btn" id="newBtn">＋ Nouveau chat</button>
    <div class="search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" placeholder="Rechercher…" autocomplete="off"/>
    </div>
    <div class="chips" id="chips"></div>
    <div class="sessions" id="sessions"><div class="loading">Chargement…</div></div>
    <div class="side-foot"><span id="footStat">—</span></div>
  </aside>
  <div class="scrim" id="scrim"></div>

  <main id="main">
    <div class="top">
      <button class="icon-btn hamburger" id="hamburger">☰</button>
      <div style="min-width:0;flex:1">
        <div class="top-title" id="topTitle">LLM Web</div>
        <div class="top-sub" id="topSub">Toutes tes sessions, tous tes LLM</div>
      </div>
      <span class="badge" id="topBadge" style="display:none"></span>
    </div>
    <div class="messages" id="messages">
      <div class="empty">
        <div class="big">▐█▛█▛█▌</div>
        <h2>Bienvenue</h2>
        <div>Choisis une session à gauche, ou lance un nouveau chat<br/>avec n'importe quel LLM installé.</div>
      </div>
    </div>
    <div class="composer" id="composer" style="display:none">
      <div class="composer-inner">
        <div class="provider-row" id="providerRow"></div>
        <div class="input-box">
          <textarea id="input" rows="1" placeholder="Écris un message…"></textarea>
          <button class="send" id="sendBtn" title="Envoyer">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
          </button>
        </div>
        <div class="hint" id="hint"></div>
      </div>
    </div>
  </main>
</div>
<script src="/app.js"></script>
</body>
</html>
